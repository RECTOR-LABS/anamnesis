# Anamnesis reverse proxy — Cloudflare-proxied variant (Origin CA cert + SSL mode "Full (strict)").
#
# Use this INSTEAD of anamnesis.conf when the domain is proxied through Cloudflare (orange cloud).
# certbot/Let's Encrypt (HTTP-01) cannot validate behind the orange cloud, whereas a Cloudflare
# Origin CA cert is a 15-year cert (no renewal) trusted by Cloudflare's edge. See RUNBOOK step 7A.
#
# Expects the Origin CA cert + key at:
#   /etc/ssl/cloudflare/anamnesis.pem   (Origin Certificate)
#   /etc/ssl/cloudflare/anamnesis.key   (Private Key, chmod 600)
# Replace ANAMNESIS_DOMAIN, copy to /etc/nginx/sites-available/anamnesis, symlink, reload nginx.
# Then set ANAMNESIS_GRAPHS_BASE_URL=https://ANAMNESIS_DOMAIN/graphs so cluster_graph links resolve.

server {
    listen 80;
    server_name ANAMNESIS_DOMAIN;
    # Cloudflare speaks HTTPS to the origin under Full (strict); redirect any plain-HTTP hit.
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name ANAMNESIS_DOMAIN;

    ssl_certificate     /etc/ssl/cloudflare/anamnesis.pem;
    ssl_certificate_key /etc/ssl/cloudflare/anamnesis.key;

    client_max_body_size 8m;

    # Optional: log real visitor IPs. Add the current ranges from https://www.cloudflare.com/ips/
    # as `set_real_ip_from <cidr>;` lines, then uncomment:
    # real_ip_header CF-Connecting-IP;

    # Rendered cluster-graph HTML. The trailing slash strips the /graphs/ prefix, so a request to
    # /graphs/cluster_<seed>.html proxies to the graph server's root.
    location /graphs/ {
        proxy_pass http://127.0.0.1:7866/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebUI (Gradio). Needs WebSocket upgrade for streaming; generous read timeout for the
    # multi-step agent query (Qwen round-trips + MCP child + live Helius reads).
    location / {
        proxy_pass http://127.0.0.1:7860;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
