# Anamnesis reverse proxy — Cloudflare-proxied variant (Origin CA cert + SSL mode "Full (strict)").
#
# One upstream: the app container (uvicorn) serves the React dashboard at / and the API at /api/*
# on 127.0.0.1:8000. Use this INSTEAD of anamnesis.conf when the domain is proxied through
# Cloudflare (orange cloud). certbot/Let's Encrypt (HTTP-01) cannot validate behind the orange
# cloud, whereas a Cloudflare Origin CA cert is a 15-year cert (no renewal) trusted by Cloudflare's
# edge. See RUNBOOK step 7A.
#
# Expects the Origin CA cert + key at:
#   /etc/ssl/cloudflare/anamnesis.pem   (Origin Certificate)
#   /etc/ssl/cloudflare/anamnesis.key   (Private Key, chmod 600)
# Replace ANAMNESIS_DOMAIN, copy to /etc/nginx/sites-available/anamnesis, symlink, reload nginx.

server {
    listen 80;
    server_name ANAMNESIS_DOMAIN;
    # Cloudflare speaks HTTPS to the origin under Full (strict); redirect any plain-HTTP hit.
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name ANAMNESIS_DOMAIN;

    ssl_certificate     /etc/ssl/cloudflare/anamnesis.pem;
    ssl_certificate_key /etc/ssl/cloudflare/anamnesis.key;

    # Harden the origin: the Security Group opens 443 to the world, so anyone who learns the ECS IP
    # can reach the origin directly, bypassing Cloudflare's WAF/DDoS. Lock the origin to Cloudflare
    # with EITHER Authenticated Origin Pulls (recommended — download Cloudflare's origin-pull CA,
    # then `ssl_client_certificate /etc/ssl/cloudflare/origin-pull-ca.pem; ssl_verify_client on;`)
    # OR an allow/deny list of the ranges at https://www.cloudflare.com/ips/.

    client_max_body_size 8m;

    # Optional: log real visitor IPs. Add the current ranges from https://www.cloudflare.com/ips/
    # as `set_real_ip_from <cidr>;` lines, then uncomment:
    # real_ip_header CF-Connecting-IP;

    # API. /api/chat streams Server-Sent Events token-by-token, so buffering/caching are off and the
    # connection is held open for the multi-step agent (Qwen round-trips + MCP child + live Helius).
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # The built React dashboard (SPA + hashed assets), served by the same uvicorn container.
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
