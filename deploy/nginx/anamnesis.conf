# Anamnesis reverse proxy — Qwen-Agent WebUI (Gradio) + the cluster-graph server.
#
# Install: replace ANAMNESIS_DOMAIN, copy to /etc/nginx/sites-available/anamnesis, symlink into
# sites-enabled/, `nginx -t` (passes — this is plain HTTP), then `certbot --nginx -d
# ANAMNESIS_DOMAIN`. certbot CLONES this block into a TLS (443) server, installs the LE cert, and
# adds the HTTP->HTTPS redirect. Shipping a `listen 443 ssl` block here would fail `nginx -t`
# (no cert exists yet) and abort certbot — so the TLS block is left for certbot to generate.
# Then set ANAMNESIS_GRAPHS_BASE_URL=https://ANAMNESIS_DOMAIN/graphs so cluster_graph links resolve.

server {
    listen 80;
    server_name ANAMNESIS_DOMAIN;

    client_max_body_size 8m;

    # Rendered cluster-graph HTML. The trailing slash strips the /graphs/ prefix, so a request to
    # /graphs/cluster_<seed>.html proxies to the graph server's root.
    location /graphs/ {
        proxy_pass http://127.0.0.1:7866/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebUI (Gradio). Needs WebSocket upgrade for streaming; generous read timeout for the
    # multi-step agent query (Qwen round-trips + MCP child + live Helius reads).
    location / {
        proxy_pass http://127.0.0.1:7860;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
