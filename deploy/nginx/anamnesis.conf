# Anamnesis reverse proxy — Qwen-Agent WebUI (Gradio) + the cluster-graph server.
#
# Install:  replace ANAMNESIS_DOMAIN below, copy to /etc/nginx/sites-available/anamnesis,
#           symlink into sites-enabled/, `nginx -t`, then `certbot --nginx -d ANAMNESIS_DOMAIN`
#           (certbot adds the ssl_certificate / listen 443 ssl directives in place).
# Set ANAMNESIS_GRAPHS_BASE_URL=https://ANAMNESIS_DOMAIN/graphs so cluster_graph links resolve.

server {
    listen 80;
    server_name ANAMNESIS_DOMAIN;

    location /.well-known/acme-challenge/ { root /var/www/html; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    server_name ANAMNESIS_DOMAIN;

    # certbot --nginx fills in ssl_certificate, ssl_certificate_key, and the SSL includes here.

    client_max_body_size 8m;

    # Rendered cluster-graph HTML. Trailing slash strips the /graphs/ prefix so a request to
    # /graphs/cluster_<seed>.html proxies to the graph server's root.
    location /graphs/ {
        proxy_pass http://127.0.0.1:7866/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebUI (Gradio). Needs WebSocket upgrade for streaming; generous read timeout for the
    # multi-step agent query (Qwen round-trips + MCP child + live Helius reads).
    location / {
        proxy_pass http://127.0.0.1:7860;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
