# Anamnesis reverse proxy — the dashboard+API container (uvicorn).
#
# One upstream: the app container serves the React dashboard at / and the API at /api/* on
# 127.0.0.1:8000. Install: replace ANAMNESIS_DOMAIN, copy to /etc/nginx/sites-available/anamnesis,
# symlink into sites-enabled/, `nginx -t` (passes — this is plain HTTP), then `certbot --nginx -d
# ANAMNESIS_DOMAIN`. certbot CLONES this block into a TLS (443) server, installs the LE cert, and
# adds the HTTP->HTTPS redirect. Shipping a `listen 443 ssl` block here would fail `nginx -t`
# (no cert exists yet) and abort certbot — so the TLS block is left for certbot to generate.

server {
    listen 80;
    server_name ANAMNESIS_DOMAIN;

    client_max_body_size 8m;

    # API. /api/chat streams Server-Sent Events token-by-token, so buffering/caching are off and the
    # connection is held open for the multi-step agent (Qwen round-trips + MCP child + live Helius).
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # The built React dashboard (SPA + hashed assets), served by the same uvicorn container.
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
