# Anamnesis — self-hosted ($0) deploy: the dashboard+API container + a self-hosted MongoDB.
# Mongo has NO host port (reached only via the compose network); the app publishes to the host's
# 127.0.0.1 only, behind nginx (see deploy/nginx/anamnesis-cloudflare.conf + deploy/RUNBOOK.md).
name: anamnesis

services:
  app:
    build: .
    image: anamnesis-app
    restart: unless-stopped
    env_file: .env                 # ANAMNESIS_DASHSCOPE_API_KEY + ANAMNESIS_HELIUS_API_KEY (+ rest)
    environment:
      # Point memory at the self-hosted Mongo on the compose network (overrides any .env URI).
      ANAMNESIS_MONGODB_URI: "mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongo:27017/?authSource=admin"
    ports:
      - "127.0.0.1:8000:8000"      # uvicorn — serves the SPA at / and the API at /api/*, behind nginx
    depends_on:
      mongo:
        condition: service_healthy
    networks: [anamnesis-net]

  mongo:
    image: mongo:7
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: "${MONGO_USER}"
      MONGO_INITDB_ROOT_PASSWORD: "${MONGO_PASSWORD}"
    volumes:
      - anamnesis-mongo-data:/data/db
    # Intentionally no `ports:` — the app reaches it at mongo:27017 over the internal network only.
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [anamnesis-net]

volumes:
  anamnesis-mongo-data:
    name: anamnesis-mongo-data

networks:
  anamnesis-net:
    name: anamnesis-net
