name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: lint + test (pure core)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      # Test tooling + the runtime deps the current tests exercise: httpx (with
      # respx to mock it) for the forensic reads, pymongo + mongomock for the
      # memory-store contract — mongomock stands in for ApsaraDB so the Mongo
      # translation is verified without a server — fastapi for the api/ routes
      # (tests/api/test_assess_route.py drives them via FastAPI's TestClient, no
      # network), and sse-starlette for the /api/chat SSE stream
      # (tests/api/test_chat_route.py, same TestClient, no network, no real
      # qwen-agent). Heavier deps (qwen-agent, mcp) are still added per-task as
      # their tests land, keeping this check fast and access-independent. ruff is
      # pinned to the locally-verified version so the lint result is reproducible
      # (new ruff minors add rules).
      - name: Install test tooling
        run: python -m pip install "pytest>=8" "ruff==0.15.18" "httpx>=0.27" "respx>=0.21" "pymongo>=4.6,<5" "mongomock>=4.1" "fastapi==0.138.0" "sse-starlette==3.4.5"

      - name: Lint (ruff)
        run: ruff check .

      - name: Test (pytest)
        run: pytest -q

      # Re-run the full suite against the Mongo store. Only the `repo`-fixture tests vary
      # by backend (the rest harmlessly re-run on the in-memory fake); running everything
      # rather than a hand-maintained file list guarantees any FUTURE contract test is
      # covered on Mongo automatically, and the suite is sub-second so the cost is nil.
      # With no MONGODB_URI the fixture uses mongomock, exercising the Edge<->doc
      # serialization and bi-temporal query translation every PR; with MONGODB_URI set the
      # same command hits live ApsaraDB.
      - name: Test — Mongo store contract (mongomock)
        run: pytest -q --store=mongo

  # The dashboard (frontend/) is what the ECS build actually ships (Dockerfile's node stage runs
  # `npm run build`). Gate it on every PR so a failing vitest, a `tsc -b` type error (strict is on),
  # or an oxlint violation fails HERE, not later at `docker compose up -d --build` on the box. Also
  # exercises `npm ci` on Linux — the lockfile carries the cross-platform optional deps for it.
  frontend:
    name: frontend (build + test + lint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install (npm ci)
        run: npm ci

      - name: Test (vitest)
        run: npm run test

      - name: Type-check + build (tsc -b + vite build)
        run: npm run build

      - name: Lint (oxlint)
        run: npm run lint
