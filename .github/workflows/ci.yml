name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: lint + test (pure core)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      # Test tooling + the runtime deps the current tests exercise: httpx (with
      # respx to mock it) for the forensic reads, and pymongo + mongomock for the
      # memory-store contract — mongomock stands in for ApsaraDB so the Mongo
      # translation is verified without a server. Heavier deps (qwen-agent, mcp)
      # are still added per-task as their tests land, keeping this check fast and
      # access-independent. ruff is pinned to the locally-verified version so the
      # lint result is reproducible (new ruff minors add rules).
      - name: Install test tooling
        run: python -m pip install "pytest>=8" "ruff==0.15.18" "httpx>=0.27" "respx>=0.21" "pymongo>=4.6,<5" "mongomock>=4.1"

      - name: Lint (ruff)
        run: ruff check .

      - name: Test (pytest)
        run: pytest -q

      # Re-run ONLY the cross-backend contract files (the ones that consume the `repo`
      # fixture) against the Mongo store — the other ~50 tests don't vary by --store, so
      # re-running them here would just double CI time. With no MONGODB_URI the fixture
      # uses mongomock, exercising the Edge<->doc serialization and bi-temporal query
      # translation every PR; the same command with MONGODB_URI set hits live ApsaraDB.
      - name: Test — Mongo store contract (mongomock)
        run: pytest -q --store=mongo tests/test_memory_models.py tests/test_memory_graph.py
